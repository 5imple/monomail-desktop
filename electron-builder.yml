appId: io.github.erickim20.monomail-desktop
productName: Mail Desktop
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: Mail Desktop
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: true
dmg:
  output: ./mac
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
# Universal mac builds (arm64+x64) need per-arch native modules. With
# `npmRebuild: false`, electron-builder skipped @electron/rebuild — and
# `postinstall` only rebuilds for the runner's current arch (arm64 since
# macos-latest is Apple Silicon). x64 users got arm64 .node files and
# crashed on launch. Re-enabling npmRebuild fixes this; electron-builder
# rebuilds for both arches before merging into the universal binary.
npmRebuild: true
# Auto-update feed. The runtime UpdateManager.configureUpdater() calls
# setFeedURL with the same URL based on MONO_ENV_FIREBASE_STORAGE_BUCKET,
# so the two must stay in sync. The previous placeholder
# `https://example.com/please-configure-your-update-server` was a foot-gun:
# if a regression ever skipped setFeedURL, the updater would attempt to
# resolve that host (or any future attacker who registers it) as authoritative.
#
# `${env.MONO_ENV_FIREBASE_STORAGE_BUCKET}` is interpolated by electron-builder
# at build time. If the env var is unset, the build fails loudly instead of
# silently shipping a broken/insecure updater config.
#
# TODO: add `publisherName` once Developer ID cert CN is known so
# electron-updater verifies the new binary was signed by us, not just notarized.
publish:
  provider: generic
  url: https://storage.googleapis.com/${env.MONO_ENV_FIREBASE_STORAGE_BUCKET}/releases/
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
