appId: io.github.erickim20.monomail-desktop
productName: Mail Desktop
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: Mail Desktop
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: true
dmg:
  output: ./mac
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
# Universal mac builds (arm64+x64) need per-arch native modules. With
# `npmRebuild: false`, electron-builder skipped @electron/rebuild — and
# `postinstall` only rebuilds for the runner's current arch (arm64 since
# macos-latest is Apple Silicon). x64 users got arm64 .node files and
# crashed on launch. Re-enabling npmRebuild fixes this; electron-builder
# rebuilds for both arches before merging into the universal binary.
npmRebuild: true
# Auto-update feed. The runtime UpdateManager.configureUpdater() also
# reads MONO_ENV_UPDATE_FEED_URL and calls setFeedURL with it, so the two
# stay in sync at runtime even if app-update.yml is out of date.
#
# `${env.MONO_ENV_UPDATE_FEED_URL}` is interpolated by electron-builder at
# build time. When unset, the embedded value defaults to about:blank so
# the updater never reaches a real host until configured; the runtime
# guard in UpdateManager (`updatesDisabled`) keeps it from trying at all.
#
# TODO: add `publisherName` once Developer ID cert CN is known so
# electron-updater verifies the new binary was signed by us, not just notarized.
publish:
  provider: generic
  url: ${env.MONO_ENV_UPDATE_FEED_URL:-about:blank}
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
